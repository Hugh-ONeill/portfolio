<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" fill="none">
  <style>
    text { font-family: 'Fira Code', 'JetBrains Mono', monospace; }
    .box { rx: 6; ry: 6; stroke-width: 1.5; }
    .label { font-size: 11px; fill: var(--text, #cdd6f4); text-anchor: middle; dominant-baseline: central; }
    .sublabel { font-size: 8.5px; fill: var(--subtext0, #a6adc8); text-anchor: middle; dominant-baseline: central; }
    .arrow { stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
    .dim { font-size: 7.5px; fill: var(--surface2, #585b70); text-anchor: middle; dominant-baseline: central; }
    .group-label { font-size: 9px; fill: var(--subtext0, #a6adc8); text-anchor: middle; letter-spacing: 0.1em; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="var(--surface2, #585b70)" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="340" fill="var(--surface0, #313244)" rx="8" ry="8" opacity="0.5" />

  <!-- ============ ROW 1: Data Sources ============ -->
  <text x="130" y="22" class="group-label">DATA</text>

  <!-- Showdown Replays -->
  <rect x="16" y="36" width="110" height="44" class="box" fill="var(--base, #1e1e2e)" stroke="var(--green, #a6e3a1)" />
  <text x="71" y="52" class="label" fill="var(--green, #a6e3a1)">replays</text>
  <text x="71" y="66" class="sublabel">1962 human games</text>

  <!-- Self-Play -->
  <rect x="140" y="36" width="110" height="44" class="box" fill="var(--base, #1e1e2e)" stroke="var(--green, #a6e3a1)" />
  <text x="195" y="52" class="label" fill="var(--green, #a6e3a1)">self-play</text>
  <text x="195" y="66" class="sublabel">MCTS vs MCTS</text>

  <!-- Arrows from data to features -->
  <path d="M71,80 L71,100 L280,100 L280,120" class="arrow" stroke="var(--surface2, #585b70)" />
  <path d="M195,80 L195,100 L280,100" class="arrow" stroke="var(--surface2, #585b70)" stroke-dasharray="0" />

  <!-- ============ ROW 2: Feature Extraction ============ -->
  <rect x="210" y="120" width="140" height="50" class="box" fill="var(--base, #1e1e2e)" stroke="var(--sky, #89dceb)" />
  <text x="280" y="138" class="label" fill="var(--sky, #89dceb)">features v2</text>
  <text x="280" y="154" class="sublabel">579 dims / state</text>

  <!-- Feature breakdown annotation -->
  <rect x="380" y="115" width="170" height="60" rx="4" ry="4" fill="var(--base, #1e1e2e)" stroke="var(--surface1, #45475a)" stroke-width="1" stroke-dasharray="3" />
  <text x="465" y="130" class="dim">moves: type, power, STAB, eff (120)</text>
  <text x="465" y="142" class="dim">pokemon: stats + boosts     (444)</text>
  <text x="465" y="154" class="dim">sides: spikes, screens       (10)</text>
  <text x="465" y="166" class="dim">global: weather, speed         (5)</text>
  <line x1="350" y1="145" x2="380" y2="145" stroke="var(--surface1, #45475a)" stroke-width="1" stroke-dasharray="3" />

  <!-- Arrow from features down to training -->
  <path d="M250,170 L250,200 L195,200 L195,215" class="arrow" stroke="var(--surface2, #585b70)" />
  <path d="M310,170 L310,200 L375,200 L375,215" class="arrow" stroke="var(--surface2, #585b70)" />

  <!-- ============ ROW 3: Networks ============ -->
  <text x="195" y="207" class="group-label">TRAIN</text>

  <!-- Policy Net -->
  <rect x="130" y="215" width="130" height="50" class="box" fill="var(--base, #1e1e2e)" stroke="var(--mauve, #cba6f7)" />
  <text x="195" y="233" class="label" fill="var(--mauve, #cba6f7)">policy net</text>
  <text x="195" y="247" class="sublabel">KL div on visits</text>

  <!-- Value Net -->
  <rect x="310" y="215" width="130" height="50" class="box" fill="var(--base, #1e1e2e)" stroke="var(--mauve, #cba6f7)" />
  <text x="375" y="233" class="label" fill="var(--mauve, #cba6f7)">value net</text>
  <text x="375" y="247" class="sublabel">win prob (88% acc)</text>

  <!-- ONNX export arrows -->
  <path d="M195,265 L195,290 L480,290" class="arrow" stroke="var(--peach, #fab387)" />
  <path d="M375,265 L375,290" class="arrow" stroke="var(--peach, #fab387)" stroke-dasharray="0" />
  <text x="300" y="283" class="dim" fill="var(--peach, #fab387)">ONNX export</text>

  <!-- ============ ROW 3 RIGHT: Search ============ -->
  <text x="590" y="207" class="group-label">SEARCH</text>

  <!-- MCTS -->
  <rect x="490" y="215" width="105" height="50" class="box" fill="var(--base, #1e1e2e)" stroke="var(--lavender, #b4befe)" />
  <text x="543" y="230" class="label" fill="var(--lavender, #b4befe)">MCTS</text>
  <text x="543" y="244" class="sublabel">PUCT priors</text>
  <text x="543" y="255" class="sublabel">c = 2.0</text>

  <!-- EMM -->
  <rect x="608" y="215" width="100" height="50" class="box" fill="var(--base, #1e1e2e)" stroke="var(--lavender, #b4befe)" />
  <text x="658" y="233" class="label" fill="var(--lavender, #b4befe)">minimax</text>
  <text x="658" y="248" class="sublabel">depth 4-6</text>

  <!-- Eval -->
  <rect x="570" y="120" width="134" height="50" class="box" fill="var(--base, #1e1e2e)" stroke="var(--yellow, #f9e2af)" />
  <text x="637" y="138" class="label" fill="var(--yellow, #f9e2af)">eval</text>
  <text x="637" y="154" class="sublabel">matchup-aware boosts</text>

  <!-- Eval to search arrows -->
  <path d="M610,170 L543,215" class="arrow" stroke="var(--surface2, #585b70)" />
  <path d="M660,170 L658,215" class="arrow" stroke="var(--surface2, #585b70)" />

  <!-- ============ ROW 4: Output ============ -->

  <!-- Showdown -->
  <rect x="520" y="290" width="185" height="40" class="box" fill="var(--base, #1e1e2e)" stroke="var(--red, #f38ba8)" />
  <text x="613" y="306" class="label" fill="var(--red, #f38ba8)">Pokemon Showdown</text>
  <text x="613" y="320" class="sublabel">websocket / poke-env</text>

  <!-- Search to Showdown -->
  <path d="M543,265 L543,290 L520,290" class="arrow" stroke="var(--surface2, #585b70)" stroke-dasharray="0" />
  <path d="M658,265 L658,290" class="arrow" stroke="var(--surface2, #585b70)" stroke-dasharray="0" />

  <!-- Rust badge -->
  <rect x="16" y="296" width="80" height="28" rx="4" ry="4" fill="var(--base, #1e1e2e)" stroke="var(--peach, #fab387)" stroke-width="1" />
  <text x="56" y="312" class="sublabel" fill="var(--peach, #fab387)">Rust engine</text>

  <!-- Python badge -->
  <rect x="104" y="296" width="80" height="28" rx="4" ry="4" fill="var(--base, #1e1e2e)" stroke="var(--green, #a6e3a1)" stroke-width="1" />
  <text x="144" y="312" class="sublabel" fill="var(--green, #a6e3a1)">Python + PyTorch</text>
</svg>
